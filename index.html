<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Super Ofertas</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

.topo {
    background: #ff5722;
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 50px;
}

#search {
    padding: 10px;
    border-radius: 5px;
    border: none;
    width: 250px;
}

h2 {
    padding: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 10px;
    position: relative;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #ff5722;
    color: white;
    padding: 5px;
    border-radius: 5px;
    font-size: 12px;
}

.preco {
    color: #ff5722;
    font-weight: bold;
    font-size: 18px;
}

.old {
    text-decoration: line-through;
    color: gray;
    font-size: 14px;
}

.botao {
    display: block;
    background: #ff5722;
    color: white;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="topo">
    <img src="banner.png" class="logo">
    <input type="text" id="search" placeholder="🔎 Buscar produtos...">
</div>

<h2>🔥 Promoções do dia</h2>

<div id="produtos" class="grid"></div>

<script>

// =========================
// CARREGAR PRODUTOS
// =========================

fetch('./produtos.json')
  .then(res => res.json())
  .then(data => {

      let produtosLocal = JSON.parse(localStorage.getItem("produtos")) || [];

      const todosProdutos = [...produtosLocal, ...data];

      produtosGlobal = todosProdutos;
      mostrarProdutos(todosProdutos);

  })
  .catch(err => console.error("Erro ao carregar JSON:", err));


// =========================
// MOSTRAR PRODUTOS
// =========================

function mostrarProdutos(lista) {

    const container = document.getElementById("produtos");
    container.innerHTML = "";

    lista.forEach(prod => {

        container.innerHTML += `
        <div class="card">
            <div class="badge">${prod.desconto}</div>

            <img src="${prod.imagem}" />

            <p style="color:gray; font-size:12px;">${prod.tempo}</p>

            <h4>${prod.nome}</h4>

            <div class="old">${prod.old}</div>
            <div class="preco">${prod.preco}</div>

            <a href="${prod.link}" target="_blank" class="botao">COMPRAR</a>
        </div>
        `;
    });
}


// =========================
// BUSCA
// =========================

document.getElementById("search").addEventListener("input", e => {

    const valor = e.target.value.toLowerCase();

    const filtrados = produtosGlobal.filter(prod =>
        prod.nome.toLowerCase().includes(valor)
    );

    mostrarProdutos(filtrados);

});

</script>

</body>
</html>
