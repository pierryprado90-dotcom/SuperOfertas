<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Super Ofertas</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* TOPO */
.topo {
    background: #ff5722;
    padding: 10px 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 45px;
    border-radius: 8px;
}

#search {
    padding: 10px;
    border-radius: 6px;
    border: none;
    width: 220px;
    font-size: 14px;
}

/* TITULO */
h2 {
    padding: 15px;
    font-size: 18px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    padding: 10px;
}

/* CARD */
.card {
    background: white;
    border-radius: 10px;
    padding: 8px;
    position: relative;
    transition: 0.2s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* IMAGEM */
.card img {
    width: 100%;
    height: 180px;          /* tamanho fixo */
    object-fit: cover;      /* corta sem distorcer */
    border-radius: 8px;
    background: #fff;
}

/* DESCONTO */
.badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #ff5722;
    color: white;
    padding: 4px 6px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: bold;
}

/* TEXTO */
.tempo {
    font-size: 11px;
    color: gray;
    margin: 5px 0;
}

.nome {
    font-size: 13px;
    height: 32px;
    overflow: hidden;
}

/* PREÇO */
.old {
    text-decoration: line-through;
    color: gray;
    font-size: 12px;
}

.preco {
    color: #ff5722;
    font-weight: bold;
    font-size: 16px;
}

/* BOTÃO */
.botao {
    display: block;
    background: #ff5722;
    color: white;
    text-align: center;
    padding: 8px;
    border-radius: 6px;
    text-decoration: none;
    margin-top: 6px;
    font-size: 13px;
    transition: 0.2s;
}

.botao:hover {
    background: #e64a19;
}
</style>
</head>

<body>

<div class="topo">
    <img src="banner.png" class="logo">
    <input type="text" id="search" placeholder="🔎 Buscar produtos...">
</div>

<h2>🔥 Promoções do dia</h2>

<div id="produtos" class="grid"></div>

<script>

let produtosGlobal = [];

// =========================
// CARREGAR PRODUTOS
// =========================

fetch('./produtos.json')
  .then(res => res.json())
  .then(data => {

      let produtosLocal = JSON.parse(localStorage.getItem("produtos")) || [];

      const todosProdutos = [...produtosLocal, ...data];

      produtosGlobal = todosProdutos;
      mostrarProdutos(todosProdutos);

  });


// =========================
// MOSTRAR PRODUTOS
// =========================

function mostrarProdutos(lista) {

    const container = document.getElementById("produtos");
    container.innerHTML = "";

    lista.forEach(prod => {

        container.innerHTML += `
        <div class="card">

            <div class="badge">${prod.desconto}</div>

            <img src="${prod.imagem}" />

            <div class="tempo">${prod.tempo}</div>

            <div class="nome">${prod.nome}</div>

            <div class="old">${prod.old}</div>
            <div class="preco">${prod.preco}</div>

            <a href="${prod.link}" target="_blank" class="botao">
                COMPRAR
            </a>

        </div>
        `;
    });
}


// =========================
// BUSCA
// =========================

document.getElementById("search").addEventListener("input", e => {

    const valor = e.target.value.toLowerCase();

    const filtrados = produtosGlobal.filter(prod =>
        prod.nome.toLowerCase().includes(valor)
    );

    mostrarProdutos(filtrados);

});

</script>

</body>
</html>
