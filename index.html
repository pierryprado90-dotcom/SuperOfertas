<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Achadinhos Super Ofertas</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* TOPO */
.topo {
    background: #ff5722;
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 45px;
    border-radius: 8px;
}

#search, #categoria {
    padding: 10px;
    border-radius: 6px;
    border: none;
}

/* TEXTO */
.titulo-animado {
    color: white;
    font-weight: bold;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.08);}
    100% {transform: scale(1);}
}

/* DESTAQUE */
.destaque {
    margin: 15px;
    background: white;
    border-radius: 12px;
    padding: 10px;
    display: flex;
    gap: 15px;
}

.destaque img {
    width: 150px;
}

.destaque-preco {
    color: #ff5722;
    font-size: 22px;
    font-weight: bold;
}

.destaque-btn {
    background: #ff5722;
    color: white;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    padding: 10px;
}

/* CARD */
.card {
    position: relative;
    background: white;
    border-radius: 10px;
    padding: 8px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}

.img-box {
    aspect-ratio: 1/1;
}

.img-box img {
    width: 100%;
    object-fit: contain;
}

/* DELETE */
.delete-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: red;
    color: white;
    font-size: 12px;
    padding: 4px 6px;
    border-radius: 50%;
    cursor: pointer;
}

/* TEXTOS */
.nome {
    font-size: 13px;
}

.old {
    text-decoration: line-through;
    color: gray;
    font-size: 12px;
}

.preco {
    color: #ff5722;
    font-weight: bold;
}

/* BOTÃO */
.botao {
    display: block;
    background: #ff5722;
    color: white;
    text-align: center;
    padding: 8px;
    border-radius: 6px;
    text-decoration: none;
    margin-top: 6px;
}
</style>
</head>

<body>

<div class="topo">
    <img src="banner.png" class="logo">
    <div class="titulo-animado">🔥 Achadinhos Super Ofertas</div>
    <input type="text" id="search" placeholder="Buscar...">
    <select id="categoria">
        <option value="all">Categorias</option>
    </select>
</div>

<div id="destaque"></div>

<h2 style="padding:10px;">🔥 Promoções do dia</h2>
<div id="produtos" class="grid"></div>

<script>

let produtosGlobal = [];

function gerarCategorias(lista) {
    const select = document.getElementById("categoria");
    select.innerHTML = `<option value="all">Categorias</option>`;

    const categorias = [...new Set(
        lista.map(p => p.categoria?.toLowerCase()).filter(Boolean)
    )];

    categorias.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
    });
}

fetch('./produtos.json')
.then(res => res.json())
.then(data => {

    let local = JSON.parse(localStorage.getItem("produtos")) || [];
    let todos = [...local, ...data];

    produtosGlobal = todos;

    gerarCategorias(todos);
    mostrarDestaque(todos[0]);
    mostrarProdutos(todos);

});

function mostrarDestaque(prod) {
    if (!prod) return;

    document.getElementById("destaque").innerHTML = `
    <div class="destaque">
        <img src="${prod.imagem}">
        <div>
            <h3>${prod.nome}</h3>
            <div class="old">${prod.old || ""}</div>
            <div class="destaque-preco">${prod.preco}</div>
            <a href="${prod.link}" target="_blank" class="destaque-btn">
                🔥 Comprar Agora
            </a>
        </div>
    </div>`;
}

function mostrarProdutos(lista) {
    const container = document.getElementById("produtos");
    container.innerHTML = "";

    lista.forEach((prod, index) => {

        const isLocal = prod._local === true;

        container.innerHTML += `
        <div class="card">

            ${isLocal ? `<div class="delete-btn" onclick="removerProduto(${index})">❌</div>` : ""}

            <div class="img-box">
                <img src="${prod.imagem}">
            </div>

            <div class="nome">${prod.nome}</div>
            <div class="old">${prod.old || ""}</div>
            <div class="preco">${prod.preco}</div>

            <a href="${prod.link}" target="_blank" class="botao">
                🔥 PEGAR OFERTA
            </a>
        </div>`;
    });
}

function removerProduto(index) {
    let local = JSON.parse(localStorage.getItem("produtos")) || [];
    local.splice(index, 1);
    localStorage.setItem("produtos", JSON.stringify(local));
    location.reload();
}

/* FILTRO */
document.getElementById("categoria").addEventListener("change", e => {

    const categoria = e.target.value.toLowerCase();

    if (categoria === "all") {
        mostrarProdutos(produtosGlobal);
        return;
    }

    const filtrados = produtosGlobal.filter(prod =>
        prod.categoria && prod.categoria.toLowerCase().includes(categoria)
    );

    mostrarProdutos(filtrados);
});

/* BUSCA */
document.getElementById("search").addEventListener("input", e => {

    const texto = e.target.value.toLowerCase();

    const filtrados = produtosGlobal.filter(prod =>
        prod.nome.toLowerCase().includes(texto)
    );

    mostrarProdutos(filtrados);
});

</script>

</body>
</html>
