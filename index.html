<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Achadinhos do Pierry</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f2f4;
}

/* HEADER */
.header {
  background: #2d5bbf;
  color: white;
  display: flex;
  align-items: center;
  padding: 10px;
  gap: 15px;
}

.logo {
  width: 40px;
  height: 40px;
  background: black;
  border-radius: 8px;
}

.menu {
  display: flex;
  gap: 15px;
  font-size: 14px;
}

/* SECTIONS */
.section {
  padding: 15px;
}

.title {
  font-weight: bold;
  margin-bottom: 10px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  position: relative;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: contain;
}

.discount {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #2d5bbf;
  color: white;
  padding: 4px 6px;
  font-size: 12px;
  border-radius: 5px;
}

.time {
  font-size: 11px;
  color: gray;
}

.old {
  text-decoration: line-through;
  font-size: 12px;
  color: gray;
}

.price {
  color: purple;
  font-weight: bold;
  font-size: 16px;
}

/* BUTTON */
.btn {
  display: block;
  background: #ff5722;
  color: white;
  text-align: center;
  padding: 8px;
  border-radius: 6px;
  text-decoration: none;
  margin-top: 5px;
}
</style>

</head>

<body>

<div class="header">
  <div class="logo"></div>
  <div class="menu">
    <span>CUPOM</span>
    <span>PROMOÇÕES</span>
    <span>CATEGORIAS</span>
  </div>
</div>

<div class="section">
  <div class="title">Promoções do dia</div>
  <div class="container" id="produtos"></div>
</div>

<script>
fetch('./produtos.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('produtos');

    data.forEach(prod => {
      container.innerHTML += `
        <div class="card">
          <span class="discount">${prod.desconto}</span>
          <img src="${prod.imagem}">
          <p class="time">${prod.tempo}</p>
          <p>${prod.nome}</p>
          <span class="old">${prod.old}</span><br>
          <span class="price">${prod.preco}</span>
          <a class="btn" href="${prod.link}" target="_blank">COMPRAR</a>
        </div>
      `;
    });
  });
</script>

</body>
</html>
