<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Achadinhos Super Ofertas</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* TOPO */
.topo {
    background: #ff5722;
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo {
    width: 45px;
    border-radius: 8px;
}

#search, #categoria {
    padding: 10px;
    border-radius: 6px;
    border: none;
}

/* TEXTO */
.titulo-animado {
    color: white;
    font-weight: bold;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    padding: 10px;
}

/* CARD */
.card {
    background: white;
    border-radius: 10px;
    padding: 8px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}

.img-box {
    width: 100%;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.img-box img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

.nome {
    font-size: 13px;
}

.old {
    text-decoration: line-through;
    color: gray;
    font-size: 12px;
}

.preco {
    color: #ff5722;
    font-weight: bold;
}

.botao {
    display: block;
    background: #ff5722;
    color: white;
    text-align: center;
    padding: 8px;
    border-radius: 6px;
    text-decoration: none;
    margin-top: 6px;
}
</style>
</head>

<body>

<div class="topo">
    <img src="banner.png" class="logo">
    <div class="titulo-animado">🔥 Achadinhos Super Ofertas</div>
    <input type="text" id="search" placeholder="Buscar...">
    <select id="categoria">
        <option value="all">Categorias</option>
    </select>
</div>

<h2 style="padding:10px;">🔥 Promoções do dia</h2>
<div id="produtos" class="grid"></div>

<script>

let produtosGlobal = [];

function gerarCategorias(lista) {
    const select = document.getElementById("categoria");

    select.innerHTML = `<option value="all">Categorias</option>`;

    const categorias = [...new Set(
        lista.map(p => p.categoria?.toLowerCase()).filter(Boolean)
    )];

    categorias.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        select.appendChild(option);
    });
}

let produtosLocal = JSON.parse(localStorage.getItem("produtos")) || [];

fetch('./produtos.json')
.then(res => res.json())
.then(data => {

    const todosProdutos = [...data, ...produtosLocal];

    produtosGlobal = todosProdutos;

    gerarCategorias(todosProdutos);
    mostrarProdutos(todosProdutos);

});

function mostrarProdutos(lista) {
    const container = document.getElementById("produtos");
    container.innerHTML = "";

    lista.forEach(prod => {
        container.innerHTML += `
        <div class="card">
            <div class="img-box">
                <img src="${prod.imagem}">
            </div>
            <div class="nome">${prod.nome}</div>
            <div class="old">${prod.velho || ""}</div>
            <div class="preco">${prod.preco}</div>
            <a href="${prod.link}" target="_blank" class="botao">
                🔥 PEGAR OFERTA
            </a>
        </div>`;
    });
}

/* FILTRO */
document.getElementById("categoria").addEventListener("change", e => {

    const categoria = e.target.value.toLowerCase();

    if (categoria === "all") {
        mostrarProdutos(produtosGlobal);
        return;
function mostrarDestaque(lista) {
    const destaques = lista.filter(p => p.destaque);

    if (destaques.length === 0) return;

    const container = document.createElement("div");

    container.innerHTML = `
        <h2 style="padding:10px;">🔥 Destaque do dia</h2>
        <div class="grid">
            ${destaques.map(prod => `
                <div class="card" style="border:2px solid #ff5722;">
                    <div class="img-box">
                        <img src="${prod.imagem}">
                    </div>
                    <div class="nome">${prod.nome}</div>
                    <div class="old">${prod.velho || ""}</div>
                    <div class="preco">${prod.preco}</div>
                    <a href="${prod.link}" target="_blank" class="botao">
                        🔥 COMPRAR AGORA
                    </a>
                </div>
            `).join("")}
        </div>
    `;

    document.body.insertBefore(container, document.getElementById("produtos"));
}        
    }

    const filtrados = produtosGlobal.filter(prod =>
        prod.categoria && prod.categoria.toLowerCase().includes(categoria)
    );

    mostrarProdutos(filtrados);
});

/* BUSCA */
document.getElementById("search").addEventListener("input", e => {

    const texto = e.target.value.toLowerCase();

    const filtrados = produtosGlobal.filter(prod =>
        prod.nome.toLowerCase().includes(texto)
    );

    mostrarProdutos(filtrados);
});

</script>

</body>
</html>
