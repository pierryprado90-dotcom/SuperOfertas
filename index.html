<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Achadinhos do Pierry</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f2f4;
}

/* HEADER */
.header {
  background: #ff5722;
  display: flex;
  align-items: center;
  padding: 10px;
  gap: 10px;
}

.logo-img {
  height: 45px;
  border-radius: 8px;
}

.search {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

/* TITLE */
.section {
  padding: 15px;
}

.title {
  font-weight: bold;
  margin-bottom: 10px;
  font-size: 18px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  position: relative;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: contain;
}

/* BADGE */
.discount {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #ff5722;
  color: white;
  padding: 4px 6px;
  font-size: 12px;
  border-radius: 5px;
}

/* TEXT */
.time {
  font-size: 11px;
  color: gray;
}

.old {
  text-decoration: line-through;
  font-size: 12px;
  color: gray;
}

.price {
  color: #ee4d2d;
  font-weight: bold;
  font-size: 16px;
}

/* BUTTON */
.btn {
  display: block;
  background: #ff5722;
  color: white;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  text-decoration: none;
  margin-top: 8px;
  font-weight: bold;
}

.btn:hover {
  background: #e64a19;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="banner.png" class="logo-img">
  <input type="text" id="search" placeholder="🔍 Buscar produtos...">
</div>

<!-- SECTION -->
<div class="section">
  <div class="title">🔥 Promoções do dia</div>
  <div class="container" id="produtos"></div>
</div>

<!-- SCRIPT -->
<script>
let produtosGlobal = [];

fetch('./produtos.json')
  .then(res => res.json())
  .then(data => {
    produtosGlobal = data;
    mostrarProdutos(data);
  })
  .catch(err => console.error("Erro ao carregar JSON:", err));

function mostrarProdutos(lista) {
  const container = document.getElementById('produtos');
  container.innerHTML = '';

  lista.forEach(prod => {
    container.innerHTML += `
      <div class="card">
        <span class="discount">${prod.desconto}</span>
        <img src="${prod.imagem}">
        <p class="time">${prod.tempo}</p>
        <p>${prod.nome}</p>
        <span class="old">${prod.old}</span><br>
        <span class="price">${prod.preco}</span>
        <a class="btn" href="${prod.link}" target="_blank">COMPRAR</a>
      </div>
    `;
  });
}

/* BUSCA */
document.getElementById('search').addEventListener('input', e => {
  const valor = e.target.value.toLowerCase();

  const filtrados = produtosGlobal.filter(prod =>
    prod.nome.toLowerCase().includes(valor)
  );

  mostrarProdutos(filtrados);
});
</script>

</body>
</html>
