<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Produtos</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    padding: 24px;
}

h1 {
    color: #ff5a1f;
    margin-bottom: 24px;
    font-size: 28px;
}

.form-box {
    max-width: 900px;
}

input, select {
    width: 100%;
    padding: 16px;
    margin-bottom: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 18px;
    margin-bottom: 12px;
    border: none;
    border-radius: 14px;
    background: #ff5a1f;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #e84d16;
    transform: translateY(-1px);
}

#saida {
    background: #1b1b1b;
    padding: 16px;
    border-radius: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    margin-top: 14px;
    min-height: 80px;
}

.linha {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

@media (max-width: 700px) {
    .linha {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<div class="form-box">
    <h1>🚀 Gerador de Produtos</h1>

    <input id="nome" placeholder="Nome do produto">
    <div class="linha">
        <input id="preco" placeholder="Preço atual (ex: R$79,90)">
        <input id="old" placeholder="Preço antigo (ex: R$119,90)">
    </div>

    <input id="imagem" placeholder="Link da imagem">
    <input id="link" placeholder="Link afiliado">

    <div class="linha">
        <input id="desconto" placeholder="Desconto (ex: 30%)">
        <select id="categoria">
            <option value="casa">Casa</option>
            <option value="gamer">Gamer</option>
            <option value="eletronicos">Eletrônicos</option>
            <option value="saude">Saúde</option>
            <option value="perfumes">Perfumes</option>
        </select>
    </div>

    <button type="button" onclick="gerarProduto()">🔥 Gerar Produto</button>
    <button type="button" onclick="copiarJSON()">📋 Copiar JSON</button>
    <button type="button" onclick="adicionarAoSite()">💾 Adicionar ao Site</button>

    <div id="saida"></div>
</div>

<script>
let produtoAtual = null;

function gerarProduto() {

    const nome = document.getElementById("nome").value;
    const preco = document.getElementById("preco").value;
    const old = document.getElementById("old").value;
    const imagem = document.getElementById("imagem").value;
    const link = document.getElementById("link").value;
    const categoria = document.getElementById("categoria").value;
    const descontoBruto = document.getElementById("desconto").value;

    if (!nome || !preco || !imagem || !link) {
        alert("Preencha os campos obrigatórios!");
        return;
    }

    let desconto = descontoBruto;

    if (desconto) {
        if (!desconto.startsWith("-")) desconto = "-" + desconto;
        if (!desconto.endsWith("%")) desconto = desconto + "%";
    }

    produtoAtual = {
        nome,
        preco,
        velho: old,
        imagem,
        link,
        categoria,
        desconto
    };

    document.getElementById("saida").textContent =
JSON.stringify(produtoAtual, null, 2);
}

function copiarJSON() {
    if (!produtoAtual) {
        alert("Gere o produto primeiro.");
        return;
    }

    navigator.clipboard.writeText(
JSON.stringify(produtoAtual, null, 2)
    ).then(() => {
        alert("JSON copiado.");
    });
}

function adicionarAoSite() {

    if (!produtoAtual) {
        gerarProduto();
        if (!produtoAtual) return;
    }

    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

    produtos.unshift(produtoAtual);

    localStorage.setItem("produtos", JSON.stringify(produtos));

    alert("Produto adicionado com sucesso!");

}
</script>

</body>
</html>
